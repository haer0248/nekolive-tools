        <script>
            const urlParams = new URLSearchParams(window.location.search);

            (function () {
                const text = urlParams.get('text');
                const string = text || '離席中...';

                const container = document.getElementById('chars');
                [...string].forEach(ch => {
                    const span = document.createElement('span');
                    span.className = 'char';
                    span.textContent = ch;
                    container.appendChild(span);
                });

                const subtitle = urlParams.get('subtitle');
                const subtitleEl = document.getElementById('subtitle');
                subtitleEl.textContent = subtitle || 'Be right back...';
            })();

            document.addEventListener('DOMContentLoaded', function () {
                (function () {
                    const chars = document.querySelectorAll('.char');
                    const subtitleEl = document.getElementById('subtitle');
                    const FADE_CHAR = 400;
                    const CHAR_DELAY = 100;
                    const SHOW_DURATION = 10000;
                    const FADE_OUT = 800;

                    function fadeInChar(el, delay) {
                        return new Promise(resolve => {
                            setTimeout(() => {
                                el.style.transition = `opacity ${FADE_CHAR}ms ease`;
                                el.style.opacity = '1';
                                setTimeout(resolve, FADE_CHAR);
                            }, delay);
                        });
                    }

                    function flicker() {
                        return new Promise(resolve => {
                            const steps = [{
                                opacity: '0.3',
                                duration: 350
                            },
                            {
                                opacity: '1',
                                duration: 300
                            },
                            {
                                opacity: '0.2',
                                duration: 400
                            },
                            {
                                opacity: '0.9',
                                duration: 250
                            },
                            {
                                opacity: '0.1',
                                duration: 350
                            },
                            {
                                opacity: '0.8',
                                duration: 300
                            },
                            {
                                opacity: '0',
                                duration: 500
                            },
                            ];
                            let t = 0;
                            steps.forEach(({
                                opacity,
                                duration
                            }) => {
                                setTimeout(() => {
                                    chars.forEach(el => {
                                        el.style.transition = `opacity ${duration}ms ease`;
                                        el.style.opacity = opacity;
                                    });
                                    subtitleEl.style.transition = `opacity ${duration}ms ease`;
                                    subtitleEl.style.opacity = opacity;
                                }, t);
                                t += duration;
                            });
                            setTimeout(resolve, t);
                        });
                    }

                    async function cycle() {
                        chars.forEach(el => {
                            el.style.transition = 'none';
                            el.style.opacity = '0';
                        });
                        subtitleEl.style.transition = 'none';
                        subtitleEl.style.opacity = '0';
                        await new Promise(r => setTimeout(r, 50));

                        for (let i = 0; i < chars.length; i++) {
                            await fadeInChar(chars[i], i * CHAR_DELAY);
                        }

                        subtitleEl.style.transition = `opacity ${FADE_CHAR}ms ease`;
                        subtitleEl.style.opacity = '1';

                        await new Promise(r => setTimeout(r, SHOW_DURATION));
                        await flicker();
                        await new Promise(r => setTimeout(r, 400));
                        cycle();
                    }

                    cycle();
                })();
            });
        </script>
