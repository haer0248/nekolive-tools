    <body>

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Signika+Negative&display=swap');

            * {
                margin: 0;
                box-sizing: border-box;
                overflow: hidden;
            }

            html,
            body {
                width: 100%;
                height: 100%;
            }

            body {
                font-size: 76%;
                font-family: 'Signika Negative', sans-serif;
            }

            div {
                width: 250px;
                height: 100px;
                background: white;
                font-size: 5em;
                color: #FFFFFF;

                position: absolute;
                left: 50%;
                top: 50%;
                margin-left: -125px;
                margin-top: -50px;

                text-align: center;
                line-height: 100px;

                background-color: #707070;
                border-radius: 15px;

                font-weight: bold;
            }
        </style>

        <div data-time></div>

        <script>
            function startClock() {
                const clock = document.querySelector('div[data-time]');

                function pad(x) {
                    return x < 10 ? '0' + x : x;
                }

                function updateTime() {
                    const time = new Date();

                    const h = pad(time.getHours());
                    const m = pad(time.getMinutes());

                    let current_time = '';
                    current_time += [h, m].join(':');
                    clock.innerHTML = current_time;
                }

                updateTime();

                setInterval(updateTime, 1000);
            }

            document.addEventListener('DOMContentLoaded', startClock);
        </script>
