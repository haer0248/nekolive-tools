    <head>

        <meta http-equiv="X-UA-Compatible" content="IE=edge" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=no" />
    </head>

    <body>

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap');

            :root {
                --color-main: #ffffff;
                --color-border: #ffffff;
                --color-border-px: 3px;
            }

            body {
                overflow: hidden;
                font-family: 'Roboto Mono', monospace !important;
                margin: 0;
                padding: 0;
                color: var(--color-main);
            }

            body {
                display: flex;
                height: 100vh;
                justify-content: center;
                align-items: center;
            }

            #box {
                width: 300px;
                display: flex;
                align-items: center;
                justify-content: space-evenly;
            }

            p {
                padding: 0;
                margin: 0;
                font-size: 2em;
                text-shadow: rgba(0, 0, 0) 5px 3px 3px;
            }

            .date {
                border: var(--color-border) var(--color-border-px) solid;
                box-shadow: 5px 5px 3px black;
                border-radius: 5px;
                padding: 5px 15px;
                background-color: rgba(255, 255, 255, 0.4);
            }
        </style>

        <div id="box">
            <div class="date">
                <p data-date>-----</p>
            </div>
            <div class="time">
                <p data-time>--:--</p>
            </div>
        </div>

        <script>

            function startClock() {
                const date = document.querySelector('[data-date]');
                const clock = document.querySelector('[data-time]');

                function pad(x) {
                    return x < 10 ? '0' + x : x;
                }

                function updateTime() {
                    const time = new Date();

                    const Y = pad(time.getFullYear());
                    const M = pad(time.getMonth() + 1);
                    const D = pad(time.getDate());
                    const h = pad(time.getHours());
                    const m = pad(time.getMinutes());
                    const s = pad(time.getSeconds());
                    const day = time.getDay();

                    let current_date = '', current_time = '';
                    current_date = [M, D].join('/');
                    current_time = [h, m].join(':');

                    date.innerHTML = current_date;
                    clock.innerHTML = current_time;
                }

                updateTime();

                setInterval(updateTime, 1000);
            }

            document.addEventListener('DOMContentLoaded', startClock);
        </script>
