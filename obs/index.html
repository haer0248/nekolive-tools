<!DOCTYPE html>
<html lang="zh-tw">

    <head>
        <title>網頁小工具 😺 tools.haer0248.me</title>
        <meta name="robots" content="noindex">
        <meta name="auhtor" content="猫又おにぎり (https://haer0248.me/)" />

        <link rel="icon" href="https://haer0248.me/favicon.ico" />
        <link rel="shortcut icon" href="https://haer0248.me/favicon.ico" />

        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta http-equiv="Content-Type" content="text/html" charset="uft-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=no">

        <link rel="stylesheet" href="https://nekolive.net/assets/bootstrap/dist/css/bootstrap.min.css">
    </head>

    <body data-bs-theme="dark">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC&display=swap');
            
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                overflow: hidden;
            }

            .hidden {
                opacity: 0;
            }

            .console-underscore {
                display: inline-block;
                position: relative;
                left: -1px;
                color: #FFFFFF;
            }

            body {
                font-size: 50px;
                font-family: 'Noto Sans TC', sans-serif;
                color: #FFFFFF;
            }
        </style>

        <span id="text"></span>
        <div class="console-underscore" id="console">_</div>
        <style>
            #content {
                font-family: 'Noto Sans TC';
                font-size: 16px;
            }
        </style>
        <div class="container mb-3" id="content">
            <div class="card">
                <div class="card-body">
                    <div class="alert alert-info">【幫助模式】幫助模式已自動啟用，在 OBS 使用此幫助將會自動隱藏，無需輸入任何設定。</div>

                    <form action="obs" method="get">
                        <div class="mb-3">
                            <label for="text" class="form-label">文字</label>
                            <button class="btn btn-outline-success btn-sm" type="button" id="add-text">新增</button>
                            <p class="form-text">瀏覽器的網址限制長度為 <code>2,048</code>，如果您需要超過此字元數量，請 <a href="https://gist.github.com/haer0248/71e795ff9d146ec493818f86255672ad" target="_blank" rel="noopener noreferrer">下載檔案</a> 自行變更。</p>
                            <div id="text-list">
                                <div class="input-group mb-1" data-id="0">
                                    <input type="text" id="text-pre[]" name="text-pre[]" class="form-control" placeholder="預設文字" value="預設文字。">
                                    <button class="btn btn-outline-danger" type="button" class="del-text" data-id="0">刪除</button>
                                </div>
                                <div class="input-group mb-1" data-id="1">
                                    <input type="text" id="text-pre[]" name="text-pre[]" class="form-control" placeholder="預設文字" value="第二行">
                                    <button class="btn btn-outline-danger" type="button" class="del-text" data-id="1">刪除</button>
                                </div>
                                <div class="input-group mb-1" data-id="2">
                                    <input type="text" id="text-pre[]" name="text-pre[]" class="form-control" placeholder="預設文字" value="更多行">
                                    <button class="btn btn-outline-danger" type="button" class="del-text" data-id="2">刪除</button>
                                </div>
                            </div>
                        </div>

                        <script>
                            const template = `
                            <div class="input-group mb-1" data-id="{id}">
                                <input type="text" id="text-pre[]" name="text-pre[]" class="form-control" placeholder="預設文字">
                                <button class="btn btn-outline-danger" type="button" class="del-text" data-id="{id}">刪除</button>
                            </div>`;

                            let id = 3;
                            document.getElementById('add-text').addEventListener('click', function () {
                                let div = template.replaceAll('{id}', id);
                                document.getElementById('text-list').insertAdjacentHTML('beforeend', div);
                                id++;
                            });

                            document.addEventListener('click', function (e) {
                                if (e.target.classList.contains('del-text')) {
                                    let id = e.target.getAttribute('data-id');
                                    document.querySelector(`div[data-id="${id}"]`).remove();
                                }
                            });
                        </script>

                        <div class="mb-3">
                            <label for="color" class="form-label">顏色</label>
                            <div class="input-group mb-3">
                                <span class="input-group-text">
                                    <input type="color" class="form-control form-control-color" id="colorPicker" value="#FFFFFF">
                                </span>
                                <input type="text" class="form-control" placeholder="#FFFFFF" id="color" name="color" value="#FFFFFF">
                            </div>
                        </div>
                        <script>
                            const colorPicker = document.querySelector('#colorPicker');
                            const colorValue = document.getElementById('color');

                            colorPicker.addEventListener('change', function () {
                                colorValue.value = colorPicker.value;
                            });
                        </script>

                        <div class="mb-3">
                            <label for="font" class="form-label">字體</label>
                            <input type="text" class="form-control" id="font" name="font" value="'Noto Sans TC', sans-serif" placeholder="'Noto Sans TC', sans-serif">
                            <p class="form-text">您的電腦中必須要有字體檔案。</p>
                        </div>

                        <div class="mb-3">
                            <label for="size" class="form-label">大小</label>
                            <input type="number" class="form-control" id="size" name="size" value="60" placeholder="60">
                            <p class="form-text">請在 OBS 設定長寬，並檢視預覽</p>
                        </div>

                        <div class="mb-3">
                            <label for="sec" class="form-label">換行秒數</label>
                            <input type="number" class="form-control" id="sec" name="sec" value="1" placeholder="1">
                        </div>

                        <button type="button" data-submit class="btn btn-success">產生預覽</button>
                        <p class="form-text">點選產生後，點選下方預覽就會自動複製，貼上到 OBS 後就可以使用了。</p>

                        <textarea class="form-control" readonly name="preview" id="preview" cols="30" rows="3"></textarea>

                        <script>
                            document.querySelector('button[data-submit]').addEventListener('click', function () {
                                generateUrl();
                            });

                            document.getElementById('preview').addEventListener('click', function () {
                                this.select();
                                document.execCommand('copy');
                                this.classList.add('is-valid');

                                setTimeout(() => {
                                    document.getElementById('preview').className = 'form-control';
                                }, 3000);
                            });

                            function generateUrl() {
                                let url = `https://${location.hostname}/obs?`;
                                let inputs = document.querySelectorAll('input[name="text-pre[]"]');
                                let convertedString = Array.from(inputs).map(i => i.value).join('[BR]');

                                url += `text=${convertedString}`;
                                url += `&font=${encodeURIComponent(document.getElementById('font').value)}`;
                                url += `&size=${document.getElementById('size').value}`;
                                url += `&color=${encodeURIComponent(document.getElementById('color').value)}`;
                                url += `&sec=${document.getElementById('sec').value}`;
                                url += `&obs=1`;

                                document.getElementById('preview').value = url;
                            }
                        </script>
                    </form>
                </div>
            </div>
        </div>
        <script>
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const isOBS = navigator.userAgent.includes('OBS') || urlParams.get('obs') === '1';
            const size = urlParams.get('size') || '50';
            const color = urlParams.get('color') ? urlParams.get('color').replace('%23', '') : '#FFFFFF';
            const font = urlParams.get('font') ? `"${urlParams.get('font')}"` : "'Noto Sans TC', sans-serif";
            const sec = urlParams.get('sec') || '1';
            const text = urlParams.get('text') ? urlParams.get('text').replace(/%5BBR%5D/g, '[BR]') : '預設文字。[BR]第二行[BR]更多行';
            const texte = text.split('[BR]');

            if (urlParams.has('text')) {
                generateUrl()
            }

            // Apply styles
            document.querySelector('.console-underscore').style.color = color;
            document.body.style.fontSize = size + 'px';
            document.body.style.fontFamily = font;
            document.body.style.color = color;

            // Hide content if OBS
            if (isOBS) {
                document.getElementById('content').style.display = 'none';
                document.body.removeAttribute('data-bs-theme');
            }

            var textArray = texte;
            consoleText(textArray, 'text');

            function consoleText(words, id) {
                var visible = true;
                var con = document.getElementById('console');
                var letterCount = 1;
                var x = 1;
                var waiting = false;
                var target = document.getElementById(id);
                var seconds = parseInt(sec);
                window.setInterval(function () {
                    if (letterCount === 0 && waiting === false) {
                        waiting = true;
                        target.textContent = words[0].substring(0, letterCount)
                        window.setTimeout(function () {
                            var usedWord = words.shift();
                            words.push(usedWord);
                            x = 1;
                            letterCount += x;
                            waiting = false;
                        }, 1000)
                    } else if (letterCount === words[0].length + 1 && waiting === false) {
                        waiting = true;
                        window.setTimeout(function () {
                            x = -1;
                            letterCount += x;
                            waiting = false;
                        }, seconds * 1000)
                    } else if (waiting === false) {
                        target.textContent = words[0].substring(0, letterCount)
                        letterCount += x;
                    }
                }, 60)
                window.setInterval(function () {
                    if (visible === true) {
                        con.className = 'console-underscore hidden'
                        visible = false;
                    } else {
                        con.className = 'console-underscore'
                        visible = true;
                    }
                }, 400)
            }
        </script>

        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-E5D30J36L6"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() { dataLayer.push(arguments); }
            gtag('js', new Date());

            gtag('config', 'G-E5D30J36L6');
        </script>
    </body>

</html>
