    <body>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Noto+Sans+TC:wght@100..900&display=swap');

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                overflow: hidden;
            }

            html,
            body {
                font-size: 150%;
                width: 100%;
                height: 100%;
            }

            body {
                font-family: "Fira Code", monospace;
            }

            [data-time] {
                display: flex;
                position: relative;
                letter-spacing: 2px;
                padding: 1rem;
                color: #ffffff;
                height: 100vh;
                text-shadow: rgb(0, 0, 0) 3px 0px, rgb(0, 0, 0) 2.83487px 0.981584px, rgb(0, 0, 0) 2.35766px 1.85511px, rgb(0, 0, 0) 1.62091px 2.52441px, rgb(0, 0, 0) 0.705713px 2.91581px, rgb(0, 0, 0) -0.287171px 2.98622px, rgb(0, 0, 0) -1.24844px 2.72789px, rgb(0, 0, 0) -2.07227px 2.16926px, rgb(0, 0, 0) -2.66798px 1.37182px, rgb(0, 0, 0) -2.96998px 0.42336px, rgb(0, 0, 0) -2.94502px -0.571704px, rgb(0, 0, 0) -2.59586px -1.50383px, rgb(0, 0, 0) -1.96093px -2.27041px, rgb(0, 0, 0) -1.11013px -2.78704px, rgb(0, 0, 0) -0.137119px -2.99686px, rgb(0, 0, 0) 0.850987px -2.87677px, rgb(0, 0, 0) 1.74541px -2.43999px, rgb(0, 0, 0) 2.44769px -1.73459px, rgb(0, 0, 0) 2.88051px -0.838247px;
                align-items: flex-end;
            }
        </style>

        <div data-time></div>

        <script>
            function initializePage() {
                const userAgent = navigator.userAgent;
                if (!userAgent.includes('OBS')) {
                    document.getElementById('help-text').classList.remove('obs-hide');
                }
            }

            function startClock() {
                const clock = document.querySelector('div[data-time]');

                function updateTime() {
                    const time = new Date();
                    const current_time = time.toString();

                    clock.innerHTML = `🕛 ${current_time}`;
                }

                updateTime();

                setInterval(updateTime, 1000);
            }

            document.addEventListener('DOMContentLoaded', startClock);
        </script>
