            <nav class="site-nav">

                    <a href="https://tools.nekolive.net/" class="site-nav-brand">線上小工具</a>
                </div>

            <div id="content"></div>
            <script>
                const years = new Date().getFullYear() + 1;
                const sites = [{
                    name: "OBS 用小工具",
                    style: "purple"
                }, {
                    name: "時鐘",
                    url: "/obs_time"
                }, {
                    name: "時鐘",
                    url: "/obs_time_2"
                }, {
                    name: "時鐘",
                    url: "/obs_time_3"
                }, {
                    name: "時鐘",
                    url: "/obs_time_4"
                }, {
                    name: "時鐘",
                    url: "/obs_time_5"
                }, {
                    name: "跑馬燈（輸入中樣式）",
                    url: "/obs"
                }, {
                    name: "跑馬燈（滿版）",
                    url: "/obs_marquee"
                }, {
                    name: "DVD",
                    url: "/obs_dvd"
                }, {
                    name: "Twitch 訂閱者抽獎",
                    url: "/twitch-lottery"
                }, {
                    name: "自訂倒數計時",
                    url: "/custom_timer"
                }, {
                    name: `${years} 倒數計時`,
                    url: "/years"
                }, {
                    name: "其他網址",
                    style: "warning"
                }, {
                    name: "實況主斗內平台",
                    url: "https://nekolive.net/"
                }, {
                    name: "歌單 Songlist",
                    url: "https://songlist.nekolive.net/"
                }, {
                    name: "OBS Track",
                    url: "https://track.nekolive.net/"
                }];

                const categoryIds = {
                    'OBS 用小工具': 'obs',
                    '其他網址': 'other'
                };

                function createContent() {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'page';

                    const list = document.createElement('div');

                    let currentSection = null;

                    for (let i = 0; i < sites.length; i++) {
                        if (sites[i].url) {
                            const link = document.createElement('a');
                            link.href = sites[i].url;
                            link.target = '_blank';
                            link.className = 'tool-link';

                            const name = document.createElement('span');
                            name.textContent = sites[i].name;

                            const url = document.createElement('span');
                            url.className = 'tool-link-url';
                            url.textContent = sites[i].url;

                            link.appendChild(name);
                            link.appendChild(url);

                            if (currentSection) {
                                currentSection.appendChild(link);
                            } else {
                                list.appendChild(link);
                            }
                        } else {
                            const section = document.createElement('div');
                            section.className = 'tool-section';

                            if (categoryIds[sites[i].name]) {
                                section.id = categoryIds[sites[i].name];
                            }

                            const header = document.createElement('h2');
                            header.className = 'tool-section-label';
                            header.textContent = sites[i].name;

                            section.appendChild(header);
                            list.appendChild(section);
                            currentSection = section;
                        }
                    }

                    wrapper.appendChild(list);
                    return wrapper;
                }

                function createSitesList() {
                    const container = document.createElement('div');
                    container.appendChild(createContent());
                    return container;
                }

                const contentElement = document.getElementById('content');
                if (contentElement) {
                    contentElement.appendChild(createSitesList());
                } else {
                    document.body.appendChild(createSitesList());
                }
            </script>
